<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="cursorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CDD6F4"/>
      <stop offset="100%" stop-color="#A6ADC8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>

  <!-- Cursor arrow (standard pointer shape) -->
  <path d="M 18 12 L 18 74 L 37 55 L 51 88 L 63 83 L 49 50 L 72 50 Z"
        fill="url(#cursorGrad)"
        stroke="#45475A"
        stroke-width="1.5"
        stroke-linejoin="round"/>

  <!-- Clock face -->
  <circle cx="83" cy="83" r="27" fill="#313244" stroke="#7C3AED" stroke-width="3.5"/>

  <!-- Clock tick marks (12, 3, 6, 9) -->
  <line x1="83" y1="59" x2="83" y2="63" stroke="#585B70" stroke-width="2" stroke-linecap="round"/>
  <line x1="107" y1="83" x2="103" y2="83" stroke="#585B70" stroke-width="2" stroke-linecap="round"/>
  <line x1="83" y1="107" x2="83" y2="103" stroke="#585B70" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="83" x2="63" y2="83" stroke="#585B70" stroke-width="2" stroke-linecap="round"/>

  <!-- Hour hand (pointing to ~12) -->
  <line x1="83" y1="83" x2="83" y2="65"
        stroke="#CBA6F7" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~3 — represents the 3s default) -->
  <line x1="83" y1="83" x2="101" y2="83"
        stroke="#CBA6F7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Clock center dot -->
  <circle cx="83" cy="83" r="3" fill="#CBA6F7"/>
</svg>
